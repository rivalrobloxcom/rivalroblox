{% extends 'base.html' %}{% block content %}<main class="auth-card glass"><h1>{{'Create Account' if mode=='register' else 'Login'}}</h1>{% if error %}<p class="error">{{error}}</p>{% endif %}<form method="post">{% if mode=='register' %}<label>Username<input name="username" required maxlength="24"></label>{% endif %}<label>Email<input name="email" type="email" required></label><label>Password<input name="password" type="password" required></label><button class="primary" type="submit">{{'Register' if mode=='register' else 'Login'}}</button></form><p>{% if mode=='register' %}Already have account? <a href="/login">Login</a>{% else %}No account? <a href="/register">Register</a>{% endif %}</p></main>{% endblock %}
