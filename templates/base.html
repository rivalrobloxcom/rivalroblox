<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Rivals LFG</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="static/css/style.css"></head><body><div class="site"><nav class="nav"><a class="logo" href="/">RIVALS <span>LFG</span></a><div class="navlinks"><a class="navitem {{'active' if request.path=='/' else ''}}" href="/"><b><span class="nav-ico ico-home"></span> Home</b><small>Front Page</small></a><a class="navitem {{'active' if request.path.startswith('/lfg') else ''}}" href="/lfg"><b><span class="nav-ico ico-lfg"></span> LFG</b><small>Find Players</small></a><a class="navitem {{'active' if request.path.startswith('/create-post') else ''}}" href="/create-post"><b><span class="nav-ico ico-posts"></span> Posts</b><small>Create Post</small></a><a class="navitem" target="_blank" href="https://discord.com"><b><span class="nav-ico ico-discord"></span> Discord</b><small>Join Server</small></a></div><div class="navright"><button id="bell" class="bell"><i class="bell-icon"></i>{% if unread %}<span>{{unread}}</span>{% endif %}</button>{% if user %}<div class="profile"><button class="loginbtn">{{user.username}}</button><div class="profilemenu"><strong>{{user.username}}</strong><small>{{user.rank}} • {{user.region}}</small><a href="/lfg">My Parties via Bell</a><a href="/logout">Logout</a></div></div>{% else %}<a class="loginbtn" href="/login">Login</a>{% endif %}</div></nav><div id="notifyPanel" class="notify-panel"><div class="notify-head"><b>Notifications & My Parties</b><button id="closeNotify">×</button></div><div id="notifyContent" class="notify-content"></div></div>{% block content %}{% endblock %}</div><script src="static/js/config.js"></script><script src="static/js/common.js"></script>{% block scripts %}{% endblock %}</body></html>
